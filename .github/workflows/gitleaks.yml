name: gitleaks

# Secret scanning via the upstream gitleaks binary (MIT-licensed, free).
# The gitleaks-action@v2 wrapper is now paywalled for org-owned repos, so
# we run the CLI directly — same rules, no license gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VERSION="8.21.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | tar -xz
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan repo history
        run: gitleaks detect --source . --verbose --redact --exit-code 1
